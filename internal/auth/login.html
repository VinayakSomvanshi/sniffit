<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SniffIt — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5ff; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px 40px; width: 400px; }
    .logo { font-size: 24px; font-weight: 700; color: #4f46e5; margin-bottom: 8px; }
    .sub { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: #4f46e5; }
    button { width: 100%; margin-top: 24px; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { margin-top: 12px; color: #dc2626; font-size: 13px; display: none; }
    .hint { margin-top: 16px; font-size: 12px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SniffIt</div>
    <div class="sub">RabbitMQ Observability Platform</div>
    <form id="loginForm">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." autocomplete="current-password" required>
      <div class="error" id="errorMsg"></div>
      <button type="submit">Sign In</button>
    </form>
    <div class="hint">Contact your administrator to obtain an API key.</div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('errorMsg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      const key = document.getElementById('apiKey').value;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key })
        });
        if (res.ok) {
          const data = await res.json();
          if (data.token) {
            localStorage.setItem('sniffit_api_key', data.token);
          }
          window.location.href = '/';
        } else {
          const body = await res.json().catch(() => ({ message: 'Authentication failed' }));
          errorEl.textContent = body.message || 'Authentication failed';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Network error — is the server running?';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
