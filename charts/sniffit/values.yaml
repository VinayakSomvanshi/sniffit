# Default values for sniffit.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: vinzyzk/sniffit-control-plane
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

probeImage:
  repository: vinzyzk/sniffit-probe
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

webhook:
  port: 443
  # Cert-manager integration
  certManager:
    enabled: true

config:
  # Get your API key from https://openrouter.ai/
  openRouterKey: "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"
  aiTriggerLevel: "error"
  controlPlaneUrl: "" # If empty, derive from service name
  insecureSkipVerify: true
  database:
    url: ""           # If set, use PostgreSQL; else SQLite
    sqlitePath: "./sniffit-data/sniffit.db"

auth:
  enabled: false
  sessionSecret: ""
  rateLimitDefault: 100
  oidc:
    enabled: false
    issuerUrl: ""
    clientId: ""
    clientSecret: ""  # via secretKeyRef
    redirectUrl: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Explicit External Monitors
# For monitoring CloudAMQP, Amazon MQ, or standalone brokers outside this cluster.
externalMonitors: []
# - name: "production-rmq-01"
#   host: "10.0.0.5" # The IP address of the external RabbitMQ
#   port: 5672
#   interface: "eth0"
#   tenant_id: "default"
#   api_key: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
