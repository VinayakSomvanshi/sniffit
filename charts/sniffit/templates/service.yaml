apiVersion: v1
kind: Service
metadata:
  name: {{ include "sniffit.fullname" . }}
  labels:
    {{- include "sniffit.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.webhook.port }}
      targetPort: http
      protocol: TCP
      name: webhook
  selector:
    {{- include "sniffit.selectorLabels" . | nindent 4 }}
